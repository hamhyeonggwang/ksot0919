<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>통합 신청 | 2026 OT Beyond Borders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="register.css">
  <style>
    /* ===== 통합 신청 전용 스타일 ===== */
    .all-reg-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 120px;
    }
    .prog-select-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 40px;
    }
    @media (max-width: 560px) {
      .prog-select-grid { grid-template-columns: 1fr; }
    }
    .prog-select-card {
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      position: relative;
    }
    .prog-select-card:hover {
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }
    .prog-select-card.selected {
      border-color: var(--orange);
      background: rgba(232,80,31,0.08);
    }
    .prog-select-card input[type="checkbox"] {
      position: absolute;
      top: 18px; right: 18px;
      width: 20px; height: 20px;
      accent-color: var(--orange);
      cursor: pointer;
    }
    .card-badge {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 700; color: #fff;
      padding: 3px 10px; border-radius: 100px;
      margin-bottom: 10px;
    }
    .card-badge.green  { background: var(--green); }
    .card-badge.orange { background: var(--orange); }
    .card-badge.blue   { background: var(--blue); }
    .card-badge.purple { background: var(--purple); }
    .card-badge.teal   { background: #0d9488; }
    .card-title {
      font-size: 15px; font-weight: 700;
      color: rgba(255,255,255,0.92);
      line-height: 1.4;
      margin-bottom: 6px;
      padding-right: 28px;
    }
    .card-meta {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      line-height: 1.5;
    }

    /* 하단 고정 바 */
    .cart-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--navy);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      z-index: 200;
      transition: transform 0.3s;
    }
    .cart-bar.hidden { transform: translateY(100%); }
    .cart-count {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
    }
    .cart-count strong {
      color: var(--orange);
      font-size: 18px;
    }
    .cart-btn {
      padding: 12px 28px;
      background: var(--orange);
      color: #fff;
      border: none; border-radius: 10px;
      font-family: var(--body);
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: filter 0.2s;
      white-space: nowrap;
    }
    .cart-btn:hover { filter: brightness(1.12); }
    .cart-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 선택 요약 */
    .selected-summary {
      background: rgba(232,80,31,0.08);
      border: 1px solid rgba(232,80,31,0.25);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 32px;
    }
    .selected-summary-title {
      font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--orange);
      margin-bottom: 10px;
    }
    .selected-summary-list {
      list-style: none;
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .selected-summary-list li {
      font-size: 13px; font-weight: 600;
      background: rgba(232,80,31,0.15);
      color: rgba(255,255,255,0.9);
      padding: 4px 12px; border-radius: 20px;
    }

    /* 섹션 구분 */
    .section-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 40px 0 24px;
    }
    .section-divider span {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
      white-space: nowrap;
    }
    .section-divider::before,
    .section-divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    /* 라이트 테마 오버라이드 */
    body { background: var(--ivory); color: var(--black); }
    .reg-page-header { background: var(--navy); border-bottom-color: rgba(255,255,255,0.08); }
    .reg-page-header .reg-back-btn { color: rgba(255,255,255,0.7); }
    .reg-page-header .reg-back-btn:hover { color: #fff; }
    .reg-page-header .reg-site-title { color: rgba(255,255,255,0.4); }
    .reg-page-title { color: var(--navy); }
    .reg-page-desc { color: var(--text-sub); }
    .reg-form-section-title { color: var(--text-sub); }
    .form-group label { color: var(--black); }
    .form-group input, .form-group select, .form-group textarea {
      background: #fff;
      border-color: var(--border);
      color: var(--black);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--orange);
      background: #fff;
    }
    .form-group select option { background: #fff; color: var(--black); }
    .form-group .hint { color: var(--text-dim); }
    .radio-group label {
      background: #fff;
      border-color: var(--border);
      color: var(--black);
    }
    .radio-group label:has(input:checked) {
      border-color: var(--orange);
      background: rgba(232,80,31,0.06);
    }
    .reg-divider { background: var(--border); }
    .form-notice { color: var(--text-dim); }
    .success-title { color: var(--navy); }
    .success-desc { color: var(--text-sub); }
    .card-title { color: var(--black); }
    .card-meta { color: var(--text-sub); }
    .prog-select-card { background: #fff; border-color: var(--border); }
    .prog-select-card:hover { border-color: var(--orange); }
    .prog-select-card.selected { border-color: var(--orange); background: rgba(232,80,31,0.04); }
    .section-divider span { color: var(--text-sub); }
    .cart-bar { background: var(--navy); border-top-color: rgba(255,255,255,0.1); }
    .cart-count { color: rgba(255,255,255,0.8); }
  </style>
</head>
<body>
  <header class="reg-page-header">
    <a href="../index.html" class="reg-back-btn">← 메인으로</a>
    <span class="reg-site-title">2026 OT Beyond Borders</span>
  </header>

  <main class="all-reg-main">
    <span class="reg-prog-badge" style="background:rgba(232,80,31,0.15);color:var(--orange)">통합 신청</span>
    <h1 class="reg-page-title">참가 신청</h1>
    <p class="reg-page-desc">참여하실 프로그램을 선택하고 한 번에 신청하세요.<br>중복 선택 가능합니다.</p>

    <!-- 프로그램 선택 카드 -->
    <div class="section-divider"><span>메인 데이 · 9.19(토)</span></div>
    <div class="prog-select-grid" id="prog-grid">

      <label class="prog-select-card" data-name="보수교육 (9.19)">
        <input type="checkbox" value="보수교육 (9.19)">
        <span class="card-badge green">보수교육 · 4학점</span>
        <div class="card-title">AI와 함께 하는 작업치료 임상과 전문역량</div>
        <div class="card-meta">9.19(토) 10:00~13:00 · 대강당</div>
      </label>

      <label class="prog-select-card" data-name="명사특강 (9.19)">
        <input type="checkbox" value="명사특강 (9.19)">
        <span class="card-badge purple">명사초청 특강</span>
        <div class="card-title">AI와 돌봄</div>
        <div class="card-meta">9.19(토) 14:20~15:20 · 대강당<br>홍영일 대표 (박사)</div>
      </label>

      <label class="prog-select-card" data-name="대학원생 워크숍 (9.19)">
        <input type="checkbox" value="대학원생 워크숍 (9.19)">
        <span class="card-badge blue">대학원생 워크숍</span>
        <div class="card-title">Next OT 톡톡 2026: Our Story &amp; Study: Being &amp; Doing</div>
        <div class="card-meta">9.19(토) 10:00~13:00 · 별도 강의실<br>장정열 · facilitator · 약 50인 정원</div>
      </label>

      <label class="prog-select-card" data-name="구두논문 발표 (9.19)">
        <input type="checkbox" value="구두논문 발표 (9.19)">
        <span class="card-badge orange">구두논문 발표</span>
        <div class="card-title">학술논문 및 학위논문 구두 발표</div>
        <div class="card-meta">9.19(토) 10:00~13:00 · 별도 강의실 · 현장 심사</div>
      </label>

      <label class="prog-select-card" data-name="캡스톤 디자인 (9.19)">
        <input type="checkbox" value="캡스톤 디자인 (9.19)">
        <span class="card-badge orange">캡스톤 디자인</span>
        <div class="card-title">캡스톤 디자인 발표 및 현장 심사</div>
        <div class="card-meta">9.19(토) 10:00~13:00 · 별도 강의실<br>팀 대표자 신청</div>
      </label>

    </div>

    <div class="section-divider"><span>보수교육 강좌 · 오프라인 / 온라인</span></div>
    <div class="prog-select-grid">

      <label class="prog-select-card" data-name="온라인 강좌 (9.12)">
        <input type="checkbox" value="온라인 강좌 (9.12)">
        <span class="card-badge teal">온라인 강좌</span>
        <div class="card-title">성인 발달장애인 지원사업의 이해와 실제</div>
        <div class="card-meta">9.12(토) 14:00~18:00 (4h) · 온라인 Zoom<br>100인 정원</div>
      </label>

      <label class="prog-select-card" data-name="오프라인 강좌 9.13 아동">
        <input type="checkbox" value="오프라인 강좌 9.13 아동">
        <span class="card-badge blue">오프라인 강좌 · 아동</span>
        <div class="card-title">아동 작업치료 치료적 상호작용 전략 / 플로어타임 &amp; OPC</div>
        <div class="card-meta">9.13(일) 09:00~18:00 (8h) · 국립정신건강센터 (서울)</div>
      </label>

      <label class="prog-select-card" data-name="오프라인 강좌 9.20 성인">
        <input type="checkbox" value="오프라인 강좌 9.20 성인">
        <span class="card-badge purple">오프라인 강좌 · 성인</span>
        <div class="card-title">회복기 재활·재택의료 / 지역사회 통합돌봄과 작업치료</div>
        <div class="card-meta">9.20(일) 09:00~18:00 (8h) · 국립정신건강센터 (서울)</div>
      </label>

    </div>

    <!-- 하단 고정 장바구니 바 -->
    <div class="cart-bar hidden" id="cart-bar">
      <div class="cart-count">선택한 프로그램 <strong id="cart-num">0</strong>개</div>
      <button class="cart-btn" id="cart-btn">신청서 작성하기 ↓</button>
    </div>

    <!-- 신청 폼 (장바구니 확인 후 표시) -->
    <div id="form-section" style="display:none">
      <div class="section-divider"><span>신청서 작성</span></div>

      <!-- 선택 요약 -->
      <div class="selected-summary">
        <div class="selected-summary-title">선택한 프로그램</div>
        <ul class="selected-summary-list" id="summary-list"></ul>
      </div>

      <div id="success-msg" class="success-msg">
        <div class="success-icon">✅</div>
        <div class="success-title">신청이 완료되었습니다</div>
        <p class="success-desc">신청이 접수되었습니다.<br>확인 후 이메일로 안내드리겠습니다.</p>
      </div>

      <form id="reg-form">
        <!-- 선택 항목을 hidden input으로 담음 -->
        <input type="hidden" name="selected_programs" id="hidden-programs">

        <div class="reg-form-section">
          <div class="reg-form-section-title">신청자 정보</div>
          <div class="form-row">
            <div class="form-group">
              <label>이름 <span class="req">*</span></label>
              <input type="text" name="name" required placeholder="홍길동">
            </div>
            <div class="form-group">
              <label>소속 <span class="req">*</span></label>
              <input type="text" name="affiliation" required placeholder="○○병원 / ○○센터">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>면허번호 <span class="req">*</span></label>
              <input type="text" name="license_no" required placeholder="작업치료사 면허번호">
            </div>
            <div class="form-group">
              <label>경력 연수 <span class="req">*</span></label>
              <select name="career_years" required>
                <option value="" disabled selected>선택</option>
                <option>1년 미만</option>
                <option>1~3년</option>
                <option>3~5년</option>
                <option>5~10년</option>
                <option>10년 이상</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>연락처 <span class="req">*</span></label>
              <input type="tel" name="phone" required placeholder="010-0000-0000">
            </div>
            <div class="form-group">
              <label>이메일 <span class="req">*</span></label>
              <input type="email" name="email" required placeholder="example@email.com">
            </div>
          </div>
        </div>

        <div class="reg-divider"></div>

        <div class="reg-form-section">
          <div class="reg-form-section-title">학술대회 본행사 참석 (9.19)</div>
          <div class="form-group">
            <label>본행사 참석 여부 <span class="req">*</span></label>
            <div class="radio-group">
              <label><input type="radio" name="attend_main" value="참석" required> 참석</label>
              <label><input type="radio" name="attend_main" value="불참"> 불참</label>
            </div>
          </div>
          <div class="form-group">
            <label>점심 식사 여부 (9.19)</label>
            <div class="radio-group">
              <label><input type="radio" name="lunch" value="신청"> 신청</label>
              <label><input type="radio" name="lunch" value="미신청"> 미신청</label>
            </div>
          </div>
        </div>

        <div class="reg-divider"></div>

        <div class="reg-form-section">
          <div class="reg-form-section-title">추가 안내</div>
          <div class="form-group">
            <label>문의사항</label>
            <textarea name="inquiry" placeholder="문의사항이 있으시면 적어주세요."></textarea>
          </div>
        </div>

        <div class="submit-wrap">
          <button type="submit" class="submit-btn" id="submit-btn">신청하기</button>
          <p class="form-notice">입력하신 정보는 학술대회 운영 목적으로만 사용됩니다.</p>
        </div>
      </form>
    </div>
  </main>

  <script>
    const cards = document.querySelectorAll('.prog-select-card');
    const cartBar = document.getElementById('cart-bar');
    const cartNum = document.getElementById('cart-num');
    const cartBtn = document.getElementById('cart-btn');
    const formSection = document.getElementById('form-section');
    const summaryList = document.getElementById('summary-list');
    const hiddenPrograms = document.getElementById('hidden-programs');

    function getSelected() {
      return [...cards].filter(c => c.querySelector('input').checked);
    }

    function updateCart() {
      const selected = getSelected();
      const count = selected.length;
      cartNum.textContent = count;
      cartBar.classList.toggle('hidden', count === 0);
    }

    cards.forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT') return; // checkbox 자체 클릭은 기본 동작 허용
        const cb = card.querySelector('input');
        cb.checked = !cb.checked;
        card.classList.toggle('selected', cb.checked);
        updateCart();
      });
      card.querySelector('input').addEventListener('change', (e) => {
        card.classList.toggle('selected', e.target.checked);
        updateCart();
      });
    });

    cartBtn.addEventListener('click', () => {
      const selected = getSelected();
      if (!selected.length) return;

      // 요약 목록 업데이트
      summaryList.innerHTML = selected
        .map(c => `<li>${c.dataset.name}</li>`)
        .join('');
      hiddenPrograms.value = selected.map(c => c.dataset.name).join(', ');

      formSection.style.display = 'block';
      formSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // 폼 제출
    const SCRIPT_URL = ''; // ✏️ Google Apps Script 배포 URL
    const form = document.getElementById('reg-form');
    const submitBtn = document.getElementById('submit-btn');
    const successMsg = document.getElementById('success-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!SCRIPT_URL) {
        // URL 없을 때 성공 시뮬레이션
        form.style.display = 'none';
        successMsg.classList.add('visible');
        cartBar.classList.add('hidden');
        formSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = '제출 중...';
      try {
        const data = Object.fromEntries(new FormData(form));
        data.submitted_at = new Date().toISOString();
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        form.style.display = 'none';
        successMsg.classList.add('visible');
        cartBar.classList.add('hidden');
        formSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (err) {
        alert('오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
        submitBtn.disabled = false;
        submitBtn.textContent = '신청하기';
      }
    });
  </script>
</body>
</html>
