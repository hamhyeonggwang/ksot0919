<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대학원생 워크숍 신청 | 2026 OT Beyond Borders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="register.css">
  <style>:root{--font-sans:var(--body);--font-display:var(--display);}</style>
</head>
<body>
  <header class="reg-page-header">
    <a href="../index.html" class="reg-back-btn">← 메인으로</a>
    <span class="reg-site-title">2026 OT Beyond Borders</span>
  </header>

  <main class="reg-main">
    <span class="reg-prog-badge" style="background:rgba(59,130,246,0.15);color:var(--blue)">대학원생 워크숍</span>
    <h1 class="reg-page-title">대학원생 워크숍 신청</h1>
    <p class="reg-page-desc">Next OT 톡톡 2026: Our Story &amp; Study: Being &amp; Doing<br>9월 19일(토) 10:00~13:00 · 별도 강의실 (~50인)</p>

    <div id="success-msg" class="success-msg">
      <div class="success-icon">✅</div>
      <div class="success-title">신청이 완료되었습니다</div>
      <p class="success-desc">대학원생 워크숍 신청이 접수되었습니다.<br>확인 후 이메일로 안내드리겠습니다.</p>
    </div>

    <form id="reg-form">
      <div class="reg-form-section">
        <div class="reg-form-section-title">신청자 정보</div>
        <div class="form-row">
          <div class="form-group">
            <label>이름 <span class="req">*</span></label>
            <input type="text" name="name" required placeholder="홍길동">
          </div>
          <div class="form-group">
            <label>소속 대학원 <span class="req">*</span></label>
            <input type="text" name="affiliation" required placeholder="○○대학교 대학원">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>학년 / 과정 <span class="req">*</span></label>
            <select name="grade" required>
              <option value="" disabled selected>선택</option>
              <option>석사 1학기</option>
              <option>석사 2학기</option>
              <option>석사 3학기 이상</option>
              <option>박사 1~2학기</option>
              <option>박사 3학기 이상</option>
              <option>석박사 통합</option>
            </select>
          </div>
          <div class="form-group">
            <label>연락처 <span class="req">*</span></label>
            <input type="tel" name="phone" required placeholder="010-0000-0000">
          </div>
        </div>
        <div class="form-group">
          <label>이메일 <span class="req">*</span></label>
          <input type="email" name="email" required placeholder="example@email.com">
        </div>
      </div>

      <div class="reg-divider"></div>

      <div class="reg-form-section">
        <div class="reg-form-section-title">연구 정보</div>
        <div class="form-group">
          <label>연구 분야 / 관심 주제 <span class="req">*</span></label>
          <input type="text" name="research_field" required placeholder="예: 감각통합, 지역사회 재활, AI 활용 등">
        </div>
        <div class="form-group">
          <label>지도교수</label>
          <input type="text" name="advisor" placeholder="○○○ 교수님">
        </div>
        <div class="form-group">
          <label>워크숍 참가 동기 <span class="req">*</span></label>
          <textarea name="motivation" required placeholder="워크숍에 참가하고 싶은 이유나 기대하는 점을 간략히 작성해 주세요."></textarea>
        </div>
      </div>

      <div class="reg-divider"></div>

      <div class="reg-form-section">
        <div class="reg-form-section-title">당일 참석 정보</div>
        <div class="form-group">
          <label>학술대회 본행사 참석 여부 <span class="req">*</span></label>
          <div class="radio-group">
            <label><input type="radio" name="attend_main" value="참석" required> 참석</label>
            <label><input type="radio" name="attend_main" value="불참"> 불참</label>
          </div>
        </div>
        <div class="form-group">
          <label>오찬 참석 여부 <span class="req">*</span></label>
          <div class="radio-group">
            <label><input type="radio" name="attend_lunch" value="참석" required> 참석</label>
            <label><input type="radio" name="attend_lunch" value="불참"> 불참</label>
          </div>
        </div>
      </div>

      <div class="submit-wrap">
        <button type="submit" class="submit-btn" id="submit-btn">신청하기</button>
        <p class="form-notice">입력하신 정보는 학술대회 운영 목적으로만 사용됩니다.</p>
      </div>
    </form>
  </main>

  <script src="register.js"></script>
</body>
</html>
