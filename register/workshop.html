<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대학원생 워크숍 신청 | 2026 OT Beyond Borders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="register.css">
  <style>:root{--font-sans:var(--body);--font-display:var(--display);}</style>
</head>
<body>
  <header class="reg-page-header">
    <a href="../index.html" class="reg-back-btn">← 메인으로</a>
    <span class="reg-site-title">2026 OT Beyond Borders</span>
  </header>

  <main class="reg-main">
    <span class="reg-prog-badge" style="background:rgba(59,130,246,0.15);color:var(--blue)">대학원생 워크숍</span>
    <h1 class="reg-page-title">대학원생 워크숍 신청</h1>
    <p class="reg-page-desc">Next OT 톡톡 2026: Our Story &amp; Study: Being &amp; Doing<br>9월 19일(토) 10:00~13:00 · <span class="venue">대전보건대학교 8동 3층 일반강의실 8323-1호</span> (약 50인)</p>

    <div id="success-msg" class="success-msg">
      <div class="success-icon">✅</div>
      <div class="success-title">신청이 완료되었습니다</div>
      <p class="success-desc">대학원생 워크숍 신청이 접수되었습니다.<br>확인 후 이메일로 안내드리겠습니다.</p>
    </div>

    <form id="reg-form">
      <input type="hidden" name="form_type" value="대학원생 워크숍">

      <div class="reg-form-section">
        <div class="reg-form-section-title">신청자 정보</div>
        <div class="form-row">
          <div class="form-group">
            <label>성명 <span class="req">*</span></label>
            <input type="text" name="name" required placeholder="홍길동">
          </div>
          <div class="form-group">
            <label>소속(학교) <span class="req">*</span></label>
            <input type="text" name="affiliation" required placeholder="○○대학교 대학원">
          </div>
        </div>
        <div class="form-group">
          <label>학위과정 <span class="req">*</span></label>
          <div class="radio-group">
            <label><input type="radio" name="degree" value="석사" required> 석사</label>
            <label><input type="radio" name="degree" value="박사"> 박사</label>
            <label><input type="radio" name="degree" value="석박통합"> 석박통합</label>
            <label><input type="radio" name="degree" value="기타"> 기타</label>
          </div>
          <div class="form-group" id="degree-etc-wrap" hidden style="margin-top:10px">
            <input type="text" name="degree_etc" placeholder="기타 과정을 입력해 주세요">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>이메일 주소 <span class="req">*</span></label>
            <input type="email" name="email" required placeholder="example@email.com">
          </div>
          <div class="form-group">
            <label>핸드폰 번호 <span class="req">*</span></label>
            <input type="tel" name="phone" required placeholder="010-0000-0000"
                   pattern="01[016789]-?\d{3,4}-?\d{4}">
          </div>
        </div>
      </div>

      <div class="reg-divider"></div>

      <div class="reg-form-section">
        <div class="reg-form-section-title">관심 주제</div>
        <div class="form-group">
          <label>관심 있는 주제 (작업치료 관련) <span class="req">*</span></label>
          <textarea name="interest" required placeholder="작업치료와 관련해 관심 있는 주제를 자유롭게 기술해 주세요."></textarea>
        </div>
      </div>

      <div class="submit-wrap">
        <button type="submit" class="submit-btn" id="submit-btn">신청하기</button>
        <p class="form-notice">입력하신 정보는 학술대회 운영 목적으로만 사용됩니다.</p>
      </div>
    </form>
  </main>

  <script src="register.js"></script>
  <script>
    // 학위과정 "기타" 선택 시 직접입력 칸 표시
    (function () {
      const etcWrap = document.getElementById('degree-etc-wrap');
      const etcInput = etcWrap.querySelector('input');
      document.querySelectorAll('input[name="degree"]').forEach(radio => {
        radio.addEventListener('change', () => {
          const isEtc = radio.value === '기타';
          etcWrap.hidden = !isEtc;
          etcInput.required = isEtc;
          if (!isEtc) etcInput.value = '';
        });
      });
    })();
  </script>
</body>
</html>
